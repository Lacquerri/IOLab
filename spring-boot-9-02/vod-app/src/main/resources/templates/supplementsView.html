<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>VOD</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <a href="./"><h1>Pix</h1></a>
    <h2 th:text="${title}"></h2>
    <h3>
    </h3>
</header>
<section>

    <table>
        <tr>
            <th>Name</th>
            <th>Flavor</th>
            <th>Producer</th>
            <th>Shops</th>
        </tr>
        <tr th:each="m : ${supplements}">
            <td th:text="${m.name}"></td>
            <td th:text="${m.flavor}"></td>
            <td>
                <a th:href="@{/supplements?producerId={id}(id=${m.producer.id})}"
                   th:text="${m.producer.name}"></a>
            </td>
            <td class="search-container">
                <a class="search" th:href="@{/shops?supplementId={id}(id=${m.id})}"></a>
            </td>
        </tr>
    </table>

</section>
<div id="orders">
</div>
<footer>
    ${tip}
</footer>

</body>
</html>
